services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    volumes:
      - epub_uploads:/app/uploads
    environment:
      - WORKERS=2
      - THREAD_POOL_WORKERS=20
      - BOOKS_FILE=uploads/books.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5003:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  epub_uploads:
    driver: local
