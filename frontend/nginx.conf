server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large uploads (EPUBs + PDFs can be several hundred MB)
    client_max_body_size 500m;

    # Proxy all API calls to the backend service
    location ~ ^/(upload|books|pdf|validate|export|file-data|health) {
        proxy_pass http://backend:5002;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Validation can take up to 10 minutes
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout  60s;
    }

    # React SPA — route everything else to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
